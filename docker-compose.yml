version: "3.9"

services:
  semantic-search:
    build: .
    image: semantic-search:latest
    container_name: semantic_search_api
    ports:
      - "8000:8000"
    volumes:
      # Mount pre-built data files so setup.py doesn't need to re-run
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s